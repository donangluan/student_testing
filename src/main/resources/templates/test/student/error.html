<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lỗi làm bài</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <div class="alert alert-danger">
        <h4 class="alert-heading">Không thể làm lại bài kiểm tra</h4>
        <p th:text="${error}"></p>
        <hr>
        <a href="/results?studentUsername=__USERNAME__" class="btn btn-primary">Xem kết quả đã nộp</a>
    </div>
</div>
</body>
</html>
