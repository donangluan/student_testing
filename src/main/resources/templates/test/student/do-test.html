<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Làm bài kiểm tra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2 class="mb-4 text-center">Làm bài kiểm tra</h2>

    <div class="mb-3">
        <p><strong>Test ID:</strong> <span th:text="${testId}"></span></p>
        <p><strong>Username:</strong> <span th:text="${studentUsername}"></span></p>
    </div>

    <div th:if="${questions != null}" class="mb-4">
        <p><strong>Số câu hỏi:</strong> <span th:text="${#lists.size(questions)}"></span></p>
    </div>

    <form th:action="@{/student/submit-test}" method="post">
        <input type="hidden" name="testId" th:value="${testId}" />
        <input type="hidden" name="studentUsername" th:value="${studentUsername}" />

        <div th:each="q : ${questions}" class="mb-4 p-3 border rounded shadow-sm">
            <p class="fw-bold" th:text="'Câu hỏi ' + ${q.questionId} + ': ' + ${q.content}"></p>
            <div class="form-check">
                <input class="form-check-input" type="radio" th:name="'q_' + ${q.questionId}" value="A" id="a_${q.questionId}" />
                <label class="form-check-label" th:for="'a_' + ${q.questionId}">
                    A. <span th:text="${q.optionA}"></span>
                </label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" th:name="'q_' + ${q.questionId}" value="B" id="b_${q.questionId}" />
                <label class="form-check-label" th:for="'b_' + ${q.questionId}">
                    B. <span th:text="${q.optionB}"></span>
                </label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" th:name="'q_' + ${q.questionId}" value="C" id="c_${q.questionId}" />
                <label class="form-check-label" th:for="'c_' + ${q.questionId}">
                    C. <span th:text="${q.optionC}"></span>
                </label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" th:name="'q_' + ${q.questionId}" value="D" id="d_${q.questionId}" />
                <label class="form-check-label" th:for="'d_' + ${q.questionId}">
                    D. <span th:text="${q.optionD}"></span>
                </label>
            </div>
        </div>

        <div class="text-center mt-4">
            <button type="submit" class="btn btn-success px-4">Nộp bài</button>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
