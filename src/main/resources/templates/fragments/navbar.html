<!-- fragments/navbar.html -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark" th:fragment="navbar" xmlns:sec="http://www.w3.org/1999/xhtml">
    <div class="container-fluid">
        <a class="navbar-brand" th:if="${#authorization.expression('hasRole(''TEACHER'')')}" th:href="@{/teacher/tests}">Home</a>
        <a class="navbar-brand" th:if="${#authorization.expression('hasRole(''ADMIN'')')}" th:href="@{/admin/dashboard}">Home</a>
        <a class="navbar-brand" th:if="${#authorization.expression('hasRole(''STUDENT'')')}" th:href="@{/my-tests}">Home</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item" th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
                    <a class="nav-link" th:href="@{/admin/dashboard}"> Thống kê</a>
                </li>
                <li class="nav-item" th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
                    <a class="nav-link" th:href="@{/admin/users}"> Quản lý tài khoản</a>
                </li>
                <li class="nav-item" th:if="${#authorization.expression('hasRole(''TEACHER'')')}">
                    <a class="nav-link" th:href="@{/teacher/tests}"> Đề kiểm tra</a>
                </li>
                <li class="nav-item" th:if="${#authorization.expression('hasAnyRole(''ADMIN'',''TEACHER'')')}">
                    <a class="nav-link" th:href="@{/student/list}"> Học viên</a>
                </li>
                <li class="nav-item" th:if="${#authorization.expression('hasRole(''STUDENT'')')}">
                    <a class="nav-link" th:href="@{/my-tests}"> Làm bài kiểm tra</a>
                </li>
                <li class="nav-item" th:if="${#authorization.expression('hasRole(''STUDENT'')')}">
                    <a class="nav-link" th:href="@{/my-results}"> Kết quả của tôi</a>
                </li>
                <li class="nav-item" th:if="${#authorization.expression('hasRole(''TEACHER'')')}">
                    <a class="nav-link" th:href="@{/questions}"> Tạo câu hỏi mới </a>
                </li>
            </ul>

            <span sec:authentication="name" class="me-2"></span>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-sm btn-danger">Đăng xuất</button>
            </form>
        </div>
    </div>
</nav>
