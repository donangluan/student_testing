<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tạo đề kiểm tra nhiều chủ đề</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<h2 class="mb-4">Tạo đề kiểm tra nhiều chủ đề</h2>

<form method="post" th:action="@{/teacher/tests/create-mixed}">
    <div class="mb-3">
        <label class="form-label">Tên đề kiểm tra</label>
        <input type="text" class="form-control" name="testName" required />
    </div>

    <div class="mb-3">
        <label class="form-label">Chọn chủ đề</label>
        <div th:each="topic : ${topics}" class="form-check">
            <input class="form-check-input" type="checkbox" name="topicIds" th:value="${topic.id}" />
            <label class="form-check-label" th:text="${topic.name}"></label>
        </div>
    </div>

    <button type="submit" class="btn btn-primary">Tạo đề</button>
</form>
</body>
</html>
